<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maxine & Antoine 🩷</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --pink: #ff6b9d;
            --pink-light: #ffb3d0;
            --pink-pale: #fff0f6;
            --peach: #ffb347;
            --yellow: #ffd166;
            --purple: #c77dff;
            --purple-light: #e0b0ff;
            --blue: #74c0fc;
            --green: #63e6be;
            --dark: #2d1b33;
            --cream: #fffbf7;
        }
        html { scroll-behavior: smooth; }
        body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--dark); overflow-x: hidden; }

        .confetti-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .confetti-dot { position: absolute; border-radius: 50%; animation: drift linear infinite; opacity: 0.12; }
        @keyframes drift {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0.12; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.03; }
        }

        /* HERO - De zwevende cirkel sectie */
        .hero {
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 2rem;
            position: relative; z-index: 1;
            background: linear-gradient(160deg, #fff0f9 0%, #fff8e7 50%, #f0f0ff 100%);
        }
        .hero-photo-wrap { 
            position: relative; 
            margin-bottom: 2.5rem; /* Ruimte onder de cirkel */
        }
        .hero-photo {
            width: 220px; /* Grootte van de cirkel */
            height: 220px; 
            border-radius: 50%; /* Maakt het een cirkel */
            object-fit: cover; /* Zorgt dat de foto mooi vult zonder rekken */
            object-position: center;
            border: 8px solid white;
            box-shadow: 0 0 0 4px var(--pink-light), 0 12px 40px rgba(255,107,157,0.3);
            display: block;
            animation: photoFloat 4s ease-in-out infinite;
        }
        @keyframes photoFloat {
            0%,100% { transform: translateY(0px) rotate(-1deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        /* Stickers rond de foto */
        .sticker { position: absolute; font-size: 2.5rem; animation: wiggle 2s ease-in-out infinite; cursor: default; user-select: none; }
        @keyframes wiggle {
            0%,100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
        }
        .sticker-1 { top: -15px; right: -20px; animation-delay: 0s; }
        .sticker-2 { bottom: 10px; left: -25px; animation-delay: 0.4s; }
        .sticker-3 { top: 30px; left: -35px; animation-delay: 0.8s; font-size: 1.8rem; }

        .hero-title {
            font-family: 'Pacifico', cursive;
            font-size: clamp(2.8rem, 9vw, 5.5rem);
            background: linear-gradient(135deg, var(--pink), var(--purple), var(--peach));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            line-height: 1.15; margin-bottom: 0.8rem;
            animation: popIn 0.7s ease 0.3s both;
        }
        .hero-sub { font-size: 1.1rem; color: #888; font-weight: 600; margin-bottom: 0.5rem; animation: popIn 0.7s ease 0.4s both; }
        .hero-sub strong { color: var(--pink); }
        .hero-date {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: white; border: 2px dashed var(--pink-light); border-radius: 20px;
            padding: 0.5rem 1.4rem; font-size: 0.9rem; font-weight: 700; color: var(--pink);
            margin-top: 0.8rem; animation: popIn 0.7s ease 0.5s both;
        }
        .scroll-bounce { margin-top: 2.5rem; font-size: 1.8rem; animation: bounceY 1.5s ease-in-out infinite 1s; cursor: default; text-decoration: none; display: block; }
        @keyframes bounceY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

        /* De rest van de styling blijft hetzelfde... */
        .countdown-section { position: relative; z-index: 1; background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%); padding: 4rem 2rem; text-align: center; overflow: hidden; }
        .countdown-title { font-family: 'Pacifico', cursive; font-size: clamp(1.6rem, 5vw, 2.5rem); color: white; margin-bottom: 2.5rem; }
        .countdown-grid { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
        .countdown-box { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border: 2px solid rgba(255,255,255,0.3); border-radius: 16px; padding: 1.2rem 1.5rem; min-width: 90px; }
        .countdown-num { font-family: 'Pacifico', cursive; font-size: 3rem; color: white; display: block; line-height: 1; }
        .countdown-unit { font-size: 0.7rem; font-weight: 800; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.4rem; }
        
        .stats-section { position: relative; z-index: 1; background: var(--cream); padding: 4rem 2rem; text-align: center; }
        .section-title { font-family: 'Pacifico', cursive; font-size: clamp(1.8rem, 5vw, 2.8rem); margin-bottom: 2.5rem; color: var(--dark); }
        .stats-bubbles { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
        .bubble { border-radius: 20px; padding: 1.5rem 2rem; min-width: 140px; transition: transform 0.2s; cursor: default; }
        .bubble-1 { background: #fff0f6; border: 2px solid var(--pink-light); }
        .bubble-num { font-family: 'Pacifico', cursive; font-size: 2.2rem; display: block; line-height: 1; color: var(--pink); }
        
        .reveal { opacity: 0; transform: translateY(25px); transition: opacity 0.7s ease, transform 0.7s ease; }
        .reveal.up { opacity: 1; transform: translateY(0); }
        
        footer { background: var(--dark); padding: 2.5rem 2rem; text-align: center; color: white; }
    </style>
</head>
<body>

<div class="confetti-bg" id="confetti"></div>

<section class="hero">
    <div class="hero-photo-wrap">
        <img class="hero-photo" 
             src="669590596_1524569445672070_8800013949306231702_n.jpg" 
             alt="Profielfoto">
        
        <span class="sticker sticker-1">💖</span>
        <span class="sticker sticker-2">✨</span>
        <span class="sticker sticker-3">🌟</span>
    </div>

    <h1 class="hero-title">Maxine<br>&amp; Antoine</h1>
    <p class="hero-sub">Vanaf <strong>18 juli 2025</strong> officieel de gelukkigste twee 🥳</p>
    <div class="hero-date">📍 Oostakker &nbsp;↔️&nbsp; Madrid</div>
    <a href="#countdown" class="scroll-bounce">👇</a>
</section>

<section class="countdown-section" id="countdown">
    <h2 class="countdown-title">Antoine komt eraan! ✈️</h2>
    <div class="countdown-grid">
        <div class="countdown-box"><span class="countdown-num" id="cd-days">00</span><div class="countdown-unit">dagen</div></div>
        <div class="countdown-box"><span class="countdown-num" id="cd-hours">00</span><div class="countdown-unit">uren</div></div>
        <div class="countdown-box"><span class="countdown-num" id="cd-mins">00</span><div class="countdown-unit">minuten</div></div>
        <div class="countdown-box"><span class="countdown-num" id="cd-secs">00</span><div class="countdown-unit">seconden</div></div>
    </div>
</section>

<script>
const colors = ['#ff6b9d','#c77dff','#ffb347','#74c0fc','#63e6be','#ffd166'];
const confettiEl = document.getElementById('confetti');
for (let i = 0; i < 25; i++) {
    const d = document.createElement('div');
    d.className = 'confetti-dot';
    const size = 6 + Math.random() * 16;
    d.style.cssText = `width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;animation-duration:${10+Math.random()*20}s;animation-delay:${Math.random()*15}s;`;
    confettiEl.appendChild(d);
}

const start = new Date('2025-07-18T00:00:00');
const updateStats = () => {
    const daysTogether = Math.max(0, Math.floor((new Date() - start) / 86400000));
    if(document.getElementById('days-count')) document.getElementById('days-count').textContent = daysTogether;
}
updateStats();

const visitDate = new Date('2026-04-22T00:00:00');
function updateCountdown() {
    const diff = visitDate - new Date();
    if (diff <= 0) { return; }
    document.getElementById('cd-days').textContent  = String(Math.floor(diff/86400000)).padStart(2,'0');
    document.getElementById('cd-hours').textContent = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
    document.getElementById('cd-mins').textContent  = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('cd-secs').textContent  = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
}
setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
